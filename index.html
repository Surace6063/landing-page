<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="images/4.jpeg" type="image/x-icon" />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/hero.css" />

    <!-- font awesome icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <title>Mero Shop</title>
  </head>
  <body>
    <!-- navbar -->
    <div class="navbar-wrap">
      <div class="navbar">
        <!-- logo -->
        <a href="#">
          <span class="logo-icon">
            <i class="fa-solid fa-bag-shopping"></i>
          </span>
          <span class="brand-name">Mero Shop</span>
        </a>

        <!-- navlinks -->
        <nav>
          <ul class="nav-links">
            <li>
              <a href="#">Home</a>
            </li>
            <li>
              <a href="#">Women</a>
            </li>
            <li>
              <a href="#">Men</a>
            </li>
            <li>
              <a href="#">kids</a>
            </li>
            <li>
              <a href="#">Accessories</a>
            </li>
          </ul>
        </nav>

        <!-- navbar actions -->
        <div class="navbar-actions">
          <a href="" class="icon-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
          </a>

          <a href="" class="icon-btn">
            <i class="fa-regular fa-heart"></i>
            <span class="badge">3</span>
          </a>

          <a href="" class="icon-btn">
            <i class="fa-solid fa-cart-arrow-down"></i>
            <span class="badge">2</span>
          </a>

          <a href="" class="icon-btn">
            <i class="fa-solid fa-user"></i>
          </a>

          <button class="nav-toggle">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- hero section -->
    <section class="container hero">
      <!-- left -->
      <div class="hero-info">
        <span class="eyebrow">
          <i class="fa fa-bolt"></i>
          <span>New Summer Collection</span>
        </span>

        <h1>
          <span class="line">SUMMER</span>
          <span class="line line-outline"> DEALS </span>
          <span class="line line-accent"> ARE HERE </span>
        </h1>

        <p>
          Our always-in-season staple, in brand new colors and your favorite
          fits — designed to move with you.
        </p>

        <div class="hero-buttons">
          <button class="btn btn-primary">Get Deals Now</button>
          <button class="btn btn-outline">View Collections</button>
        </div>

        <div class="hero-stats">
          <div class="hero-stat">
            <strong>50K+</strong>
            <span>Happy customers</span>
          </div>
          <div class="hero-stat-divider"></div>
          <div class="hero-stat">
            <strong>4.9</strong>
            <span>Average rating</span>
          </div>
          <div class="hero-stat-divider"></div>
          <div class="hero-stat">
            <strong>1.2K</strong>
            <span>New styles</span>
          </div>
        </div>
      </div>

      <!-- right -->
      <div>right</div>
    </section>

    <!-- trending section -->
    <section class="container">
      <h3>Trending</h3>
    </section>
  </body>
</html>
